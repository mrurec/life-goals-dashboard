# Prod API service. Postgres + Redis are started separately via life-goals-api/docker-compose.yml.
#
# Usage (from repo root):
#   export API_IMAGE=your-registry/life-goals-api:1.0.0   # pin a release tag
#   docker-compose -f life-goals-api/docker-compose.yml up -d
#   docker-compose -f deploy/docker-compose.prod.yml up -d
#
# All required vars must be set in the environment or a secrets manager —
# ":?" syntax causes compose to fail fast if a variable is missing or empty.

services:
  life-goals-api:
    image: ${API_IMAGE:?ghcr.io/mrurec/life-goals-api:0.0.1-SNAPSHOT}
    ports:
      - '8080:8080'
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:?POSTGRES_DB is required}
      DB_USERNAME: ${POSTGRES_USER:?POSTGRES_USER is required}
      DB_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      OAUTH_CLIENT_ID: ${OAUTH_CLIENT_ID:?OAUTH_CLIENT_ID is required}
      OAUTH_CLIENT_SECRET: ${OAUTH_CLIENT_SECRET:?OAUTH_CLIENT_SECRET is required}
      EXCHANGE_RATE_API_KEY: ${EXCHANGE_RATE_API_KEY:?EXCHANGE_RATE_API_KEY is required}
      EXCHANGE_RATE_API_URL: ${EXCHANGE_RATE_API_URL:-https://api.exchangeratesapi.io/v1/latest}
      FEATURE_FLAGS_PATH: ${FEATURE_FLAGS_PATH:-config/features.json}
    restart: always
